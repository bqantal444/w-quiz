<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌈 OVERDRIVE RAINBOW SELECTIVE BREEDING QUIZ 🌈</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Rubik+Mono+One&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Standard Rainbow Core Loop Spectrum */
            --rainbow-grad: linear-gradient(90deg, #ff007f, #ff7f00, #ffea00, #00ff7f, #00ffff, #7f00ff, #ff007f);
            --bg-dark: #050211;
            --card-glass: rgba(10, 5, 28, 0.75);
            --text-light: #ffffff;
            --accent-success: #00ff88;
            --accent-error: #ff0055;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: radial-gradient(circle at 50% 50%, #120224 0%, var(--bg-dark) 100%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient background rainbow glow */
        body::before {
            content: '';
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(127, 0, 255, 0.15) 0%, rgba(255, 0, 127, 0.05) 50%, transparent 100%);
            top: -200px;
            left: -200px;
            z-index: 0;
            pointer-events: none;
        }

        .quiz-wrapper {
            width: 100%;
            max-width: 720px;
            z-index: 2;
            position: relative;
        }

        /* 3D Rainbow Text Header Styling */
        header {
            text-align: center;
            margin-bottom: 35px;
        }

        header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 900;
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: -2px;
            background: var(--rainbow-grad);
            background-size: 400% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: moveRainbow 6s linear infinite;
            /* Heavy 3D Text Shadow Graphic Effect */
            filter: drop-shadow(2px 2px 0px rgba(0,0,0,1)) 
                    drop-shadow(-1px -1px 0px rgba(255,255,255,0.6))
                    drop-shadow(0px 0px 20px rgba(255,0,127,0.4));
            margin-bottom: 10px;
        }

        header p {
            color: #fff;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.8), 2px 2px 0px #000;
        }

        /* Dynamic Animated Rainbow-Border Card */
        .rainbow-glow-frame {
            position: relative;
            background: var(--rainbow-grad);
            background-size: 400% 400%;
            padding: 5px; /* Border thickness */
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 
                        0 0 40px rgba(127, 0, 255, 0.3);
            animation: moveRainbow 8s linear infinite;
        }

        .glass-card {
            background: var(--card-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 27px;
            padding: 40px;
            position: relative;
        }

        /* Progress Metrics Indicators */
        .progress-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .progress-badge {
            background: #000;
            color: #fff;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 800;
            text-transform: uppercase;
            border: 2px solid #fff;
            box-shadow: 3px 3px 0px #ff007f, -3px -3px 0px #00ffff;
        }

        .bar-wrapper {
            flex-grow: 1;
            height: 16px;
            background: #000;
            border-radius: 50px;
            margin-left: 20px;
            padding: 3px;
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--rainbow-grad);
            background-size: 400% auto;
            border-radius: 50px;
            transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: moveRainbow 4s linear infinite;
        }

        /* Question Graphic Typography */
        .question-title {
            font-size: 1.6rem;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 35px;
            text-shadow: 2px 2px 0px #000, 0 0 15px rgba(255,255,255,0.2);
            border-bottom: 3px dashed rgba(255,255,255,0.1);
            padding-bottom: 20px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Rainbow Option Selectors Buttons */
        .option-button {
            background: rgba(255, 255, 255, 0.03);
            border: 3px solid rgba(255, 255, 255, 0.1);
            color: var(--text-light);
            padding: 20px 25px;
            border-radius: 20px;
            font-size: 1.05rem;
            font-weight: 700;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            text-shadow: 1px 1px 2px #000;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .option-button:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
            transform: scale(1.03) rotate(-0.5deg);
            box-shadow: 0 10px 25px rgba(0, 255, 255, 0.3), 
                        0 0 15px rgba(255, 0, 127, 0.3);
            text-shadow: none;
        }

        /* Active Validation Responses */
        .option-button.correct {
            background: linear-gradient(45deg, #006633, var(--accent-success)) !important;
            border-color: #fff !important;
            color: #fff !important;
            box-shadow: 0 0 30px var(--accent-success) !important;
            font-size: 1.15rem;
            transform: scale(1.04);
        }

        .option-button.wrong {
            background: linear-gradient(45deg, #660022, var(--accent-error)) !important;
            border-color: #fff !important;
            color: #fff !important;
            box-shadow: 0 0 30px var(--accent-error) !important;
            opacity: 0.7;
        }

        /* Final Results Panel UI Dashboard */
        .results-panel {
            display: none;
            text-align: center;
        }

        .results-panel h2 {
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            background: var(--rainbow-grad);
            background-size: 400% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: moveRainbow 4s linear infinite;
            margin-bottom: 15px;
            filter: drop-shadow(2px 2px 0px #000);
        }

        /* Heavy Ring Graph Graphic */
        .score-ring {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: #000;
            border: 8px solid transparent;
            background-image: linear-gradient(#000, #000), var(--rainbow-grad);
            background-origin: border-box;
            background-clip: content-box, border-box;
            background-size: 100%, 400% auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 20px auto 30px;
            box-shadow: 0 0 40px rgba(127, 0, 255, 0.6);
            animation: moveRainbow 4s linear infinite;
        }

        .score-ring .big-number {
            font-size: 4rem;
            font-weight: 900;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            line-height: 1;
            text-shadow: 3px 3px 0px #ff007f, -3px -3px 0px #00ffff;
        }

        .score-ring .total-label {
            font-size: 1rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
        }

        #feedback-msg {
            font-size: 1.3rem;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 30px;
            text-shadow: 2px 2px 0px #000;
        }

        .review-section {
            margin-top: 35px;
            text-align: left;
            max-height: 380px;
            overflow-y: auto;
            padding-right: 15px;
            border: 2px dashed rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 20px;
            background: rgba(0,0,0,0.4);
        }

        .review-section h3 {
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #00ffff;
            text-shadow: 2px 2px 0px #000;
        }

        .review-card {
            background: rgba(255, 255, 255, 0.02);
            border: 2px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 15px;
        }

        .review-card h4 {
            font-size: 1.1rem;
            margin-bottom: 10px;
            line-height: 1.4;
            color: #fff;
        }

        .review-card p {
            font-size: 0.95rem;
            color: #fff;
            border-left: 4px solid transparent;
            background: var(--rainbow-grad);
            background-size: 400% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: moveRainbow 10s linear infinite;
            font-weight: 700;
            padding-left: 12px;
            position: relative;
        }
        
        .review-card p::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: var(--rainbow-grad);
            animation: moveRainbow 4s linear infinite;
        }

        /* Overdrive Metallic Rainbow Action Button */
        .restart-btn {
            background: var(--rainbow-grad);
            background-size: 400% auto;
            color: #fff;
            border: 3px solid #fff;
            padding: 20px 45px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 10px 30px rgba(255, 0, 127, 0.4), 0 0 15px #00ffff;
            text-shadow: 2px 2px 3px #000;
            animation: moveRainbow 4s linear infinite;
            transition: transform 0.1s;
        }

        .restart-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 15px 40px rgba(0, 255, 127, 0.6), 0 0 25px #ff007f;
        }

        /* Keyframes Animations Loops */
        @keyframes moveRainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>

<div class="quiz-wrapper">
    <header>
        <h1>✨ Artificial Selection ✨</h1>
        <p>💥 Extreme Overdrive Rainbow Edition 💥</p>
    </header>

    <div class="rainbow-glow-frame">
        <div class="glass-card">
            
            <div id="quiz-panel">
                <div class="progress-container">
                    <span class="progress-badge" id="badge-text">Q. 1 / 6</span>
                    <div class="bar-wrapper">
                        <div class="progress-bar" id="bar-fill"></div>
                    </div>
                </div>

                <h2 class="question-title" id="question-text">Assembling Neon Vectors...</h2>
                <div class="options-list" id="options-box">
                    </div>
            </div>

            <div class="results-panel" id="results-panel">
                <h2>⚡ Evaluation Terminated ⚡</h2>
                <div class="score-ring">
                    <span class="big-number" id="final-score">0</span>
                    <span class="total-label">Gained</span>
                </div>
                
                <p id="feedback-msg">Data Stream Settled</p>

                <div class="review-section">
                    <h3 style="font-size: 1.2rem; margin-bottom: 20px;">🌈 Spectrum Concepts Log:</h3>
                    <div id="review-list"></div>
                </div>

                <button class="restart-btn" onclick="resetQuiz()">Re-Ignite Array</button>
            </div>
            
        </div>
    </div>
</div>

<script>
    const questionsDatabase = [
        {
            q: "What is the primary defining feature of selective breeding (artificial selection)?",
            options: [
                "Environmental survival factors dictate which organisms successfully reproduce.",
                "Humans deliberately choose parent organisms based on specific desirable traits.",
                "Genomics engineers rewrite chromosomal codes inside a sterile laboratory.",
                "Organisms consciously alter their traits over a single lifetime to adapt to stress."
            ],
            correct: 1,
            explain: "Selective breeding relies on targeted human choices rather than dynamic natural selection pressures to determine which characteristics are propagated into next-generation bloodlines."
        },
        {
            q: "Which of these everyday domestic items is a direct byproduct of systemic plant selective breeding?",
            options: [
                "Wild mountain moss bushes",
                "Pure maple syrup tapped from untamed forests",
                "Modern domestic corn (maize) bred from wild teosinte grass",
                "Fern plants found deep inside tropical regions"
            ],
            correct: 2,
            explain: "Ancient agriculturalists systematically cross-selected Teosinte grass variants over thousands of generations to eventually yield large, nutritious modern corn crops."
        },
        {
            q: "What is a major genetic vulnerability often caused by extensive selective inbreeding?",
            options: [
                "A massive expansion of overall gene pool diversity.",
                "An increased expression of harmful, hidden recessive genetic disorders.",
                "An organism becoming instantly immune to mutating climate variations.",
                "A complete stabilization that eliminates the threat of extinction."
            ],
            correct: 1,
            explain: "Narrowing parent pools raises homozygosity, making it far more likely that harmful recessive traits find matching alleles and display physical defects or health problems."
        },
        {
            q: "What distinguishes selective breeding from modern genetic modification (GMOs)?",
            options: [
                "Selective breeding works entirely through natural reproductive mating cycles over generations.",
                "Selective breeding constructs entire synthetic organisms from artificial base elements.",
                "Genetic modification takes centuries to express minor phenotypic structural shifts.",
                "There is no difference; both processes use identical toolsets."
            ],
            correct: 0,
            explain: "Selective breeding works by steering traditional mating vectors over time, whereas genetic engineering extracts, splices, or edits DNA strands directly in a molecular lab setup."
        },
        {
            q: "If a dog breeder cross-checks parent animals to select exclusively for a massive size profile, what happens to the hidden, unselected traits?",
            options: [
                "Unselected traits will naturally expand at an identical speed factor.",
                "Unselected traits might inadvertently drop out or experience unintended side effects.",
                "All alternative anatomical functions automatically upgrade to support the size.",
                "The unselected genes transform safely into a completely passive state."
            ],
            correct: 1,
            explain: "Selecting heavily for a single feature can unintentionally lock in hidden undesirable traits, such as joint issues or shortened lifespans, due to genetic linkage."
        },
        {
            q: "Why do wild variant populations generally bounce back better from sudden ecosystem adjustments than selectively bred ones?",
            options: [
                "Wild populations are structurally larger and stronger.",
                "Wild populations maintain a highly varied pool of diverse genes to pull adaptations from.",
                "Selectively bred strains can dynamically construct new traits upon encountering threats.",
                "Selectively bred species rely entirely on complex human protections to survive."
            ],
            correct: 1,
            explain: "Genetic variation acts as an environmental safeguard. Diverse populations contain different biological resistances, whereas hyper-selected populations share identical vulnerabilities."
        }
    ];

    let itemIndex = 0;
    let pointsAccumulator = 0;
    let clickLockout = false;

    // DOM bindings
    const qText = document.getElementById('question-text');
    const optionsBox = document.getElementById('options-box');
    const badgeText = document.getElementById('badge-text');
    const barFill = document.getElementById('bar-fill');
    const quizPanel = document.getElementById('quiz-panel');
    const resultsPanel = document.getElementById('results-panel');
    const scoreLabel = document.getElementById('final-score');
    const feedbackMsg = document.getElementById('feedback-msg');
    const reviewList = document.getElementById('review-list');

    function paintUI() {
        if (itemIndex >= questionsDatabase.length) {
            evaluateEndGame();
            return;
        }

        clickLockout = false;
        const currentData = questionsDatabase[itemIndex];
        
        const calculatedProgress = (itemIndex / questionsDatabase.length) * 100;
        barFill.style.width = `${calculatedProgress}%`;
        badgeText.textContent = `STAGE ${itemIndex + 1} / ${questionsDatabase.length}`;
        
        qText.textContent = currentData.q;
        optionsBox.innerHTML = '';

        currentData.options.forEach((txt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-button';
            btn.textContent = txt;
            btn.addEventListener('click', () => verifySelection(idx, btn));
            optionsBox.appendChild(btn);
        });
    }

    function verifySelection(userChoice, triggeredBtn) {
        if (clickLockout) return;
        clickLockout = true;

        const actualCorrectIndex = questionsDatabase[itemIndex].correct;
        const totalButtons = optionsBox.children;

        if (userChoice === actualCorrectIndex) {
            pointsAccumulator++;
            triggeredBtn.classList.add('correct');
        } else {
            triggeredBtn.classList.add('wrong');
            totalButtons[actualCorrectIndex].classList.add('correct');
        }

        setTimeout(() => {
            itemIndex++;
            paintUI();
        }, 1200);
    }

    function evaluateEndGame() {
        quizPanel.style.display = 'none';
        resultsPanel.style.display = 'block';
        
        barFill.style.width = '100%';
        scoreLabel.textContent = pointsAccumulator;

        if (pointsAccumulator === 6) {
            feedbackMsg.textContent = "🔥 GODLIKE SPECTRUM RUN! PERFECT 6/6 STACK ACCUMULATED! 🔥";
            feedbackMsg.style.color = "#00ff88";
        } else if (pointsAccumulator >= 4) {
            feedbackMsg.textContent = "⚡ EXCELLENT MATRIX COMBAT! DECENT ARRAY METRICS EXPECTED! ⚡";
            feedbackMsg.style.color = "#00ffff";
        } else {
            feedbackMsg.textContent = "⚠️ REBOOT RECOMMENDED! GENETIC MISALIGNMENT TRACKED! ⚠️";
            feedbackMsg.style.color = "#ff0055";
        }

        reviewList.innerHTML = '';
        questionsDatabase.forEach((item, index) => {
            const wrap = document.createElement('div');
            wrap.className = 'review-card';
            wrap.innerHTML = `
                <h4><strong>STAGE ${index + 1}:</strong> ${item.q}</h4>
                <p>🧬 CORE LOGIC: ${item.explain}</p>
            `;
            reviewList.appendChild(wrap);
        });
    }

    function resetQuiz() {
        itemIndex = 0;
        pointsAccumulator = 0;
        resultsPanel.style.display = 'none';
        quizPanel.style.display = 'block';
        paintUI();
    }

    window.addEventListener('DOMContentLoaded', paintUI);
</script>
</body>
</html>
