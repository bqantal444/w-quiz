<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastering Selective Breeding Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-glow: #6366f1;
            --accent-success: #10b981;
            --accent-error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .quiz-wrapper {
            width: 100%;
            max-width: 680px;
            perspective: 1000px;
        }

        /* Header Animation */
        header {
            text-align: center;
            margin-bottom: 25px;
            animation: fadeInDown 0.8s ease-out;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(to right, #6366f1, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Glassmorphic Container */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: cardEntrance 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .progress-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .progress-badge {
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .bar-wrapper {
            flex-grow: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-left: 15px;
            position: relative;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        .question-title {
            font-size: 1.4rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 30px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-button {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
            padding: 18px 24px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .option-button:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(99, 102, 241, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.1);
        }

        /* Active click validation states */
        .option-button.correct {
            background: rgba(16, 185, 129, 0.15) !important;
            border-color: var(--accent-success) !important;
            color: #34d399;
            font-weight: 700;
        }

        .option-button.wrong {
            background: rgba(239, 68, 68, 0.12) !important;
            border-color: var(--accent-error) !important;
            color: #f87171;
        }

        /* Results panel elements */
        .results-panel {
            display: none;
            text-align: center;
        }

        .score-ring {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, rgba(168, 85, 247, 0.05) 100%);
            border: 4px dashed #a855f7;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 20px auto 30px;
            animation: pulseGlow 2s infinite ease-in-out;
        }

        .score-ring .big-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: #fff;
        }

        .score-ring .total-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .review-section {
            margin-top: 35px;
            text-align: left;
            max-height: 350px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .review-section::-webkit-scrollbar {
            width: 6px;
        }
        .review-section::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .review-card {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 18px;
            border-radius: 14px;
            margin-bottom: 12px;
        }

        .review-card h4 {
            font-size: 0.95rem;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .review-card p {
            font-size: 0.88rem;
            color: var(--text-secondary);
            border-left: 2px solid #6366f1;
            padding-left: 10px;
            margin-top: 6px;
        }

        .restart-btn {
            background: linear-gradient(90deg, #6366f1, #a855f7);
            color: #fff;
            border: none;
            padding: 14px 35px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 25px;
            transition: opacity 0.2s;
        }

        .restart-btn:hover {
            opacity: 0.9;
        }

        /* Animations */
        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 0px rgba(99, 102, 241, 0); }
            50% { box-shadow: 0 0 20px rgba(99, 102, 241, 0.2); }
        }
    </style>
</head>
<body>

<div class="quiz-wrapper">
    <header>
        <h1>Artificial Selection</h1>
        <p>Test your knowledge on the mechanics of Selective Breeding</p>
    </header>

    <div class="glass-card">
        <div id="quiz-panel">
            <div class="progress-container">
                <span class="progress-badge" id="badge-text">Q. 1 / 6</span>
                <div class="bar-wrapper">
                    <div class="progress-bar" id="bar-fill"></div>
                </div>
            </div>

            <h2 class="question-title" id="question-text">Loading question data...</h2>
            <div class="options-list" id="options-box">
                </div>
        </div>

        <div class="results-panel" id="results-panel">
            <h2>Evaluation Complete</h2>
            <div class="score-ring">
                <span class="big-number" id="final-score">0</span>
                <span class="total-label">out of 6</span>
            </div>
            
            <p style="color: var(--text-secondary);" id="feedback-msg">Good effort!</p>

            <div class="review-section">
                <h3 style="font-size: 1.1rem; margin-bottom: 15px; font-weight:700;">Concept Review Summaries:</h3>
                <div id="review-list"></div>
            </div>

            <button class="restart-btn" onclick="resetQuiz()">Run Quiz Again</button>
        </div>
    </div>
</div>

<script>
    const questionsDatabase = [
        {
            q: "What is the key difference between selective breeding (artificial selection) and natural selection?",
            options: [
                "Selective breeding is determined by human choices, while natural selection is driven by environmental pressures.",
                "Selective breeding occurs entirely in laboratories, whereas natural selection happens outdoors.",
                "Selective breeding happens automatically without affecting the genetic code of organisms.",
                "Natural selection produces physical changes much faster than selective breeding does."
            ],
            correct: 0,
            explain: "Selective breeding relies on humans intentionally choosing parent organisms with specific desirable traits to pass on to the next generation, whereas natural selection is guided by environmental survival factors."
        },
        {
            q: "Which of the following is considered a primary advantage or goal of selective breeding?",
            options: [
                "It naturally expands the total genetic diversity of an entire species.",
                "It allows humans to produce organisms with specific, enhanced traits like higher crop yields or tamer behavior.",
                "It makes populations completely immune to changing global temperatures.",
                "It eliminates the need for natural reproduction processes entirely."
            ],
            correct: 1,
            explain: "The primary purpose of selective breeding is to optimize and stabilize specific traits that humans find useful, such as higher agricultural output, disease resistance, or domestic passivity."
        },
        {
            q: "What is a major genetic vulnerability or risk associated with long-term selective breeding?",
            options: [
                "A dramatic inflation of the available gene pool variation.",
                "A significant reduction in genetic variation, making the population fragile to environmental shifts.",
                "Organisms learning to change their characteristics dynamically within their own lifespan.",
                "Traits reverting completely back to ancient states within a single generation."
            ],
            correct: 1,
            explain: "Because selective breeding repeatedly narrows down the parent group to match a strict trait profile, genetic variation decreases. This leaves the population highly vulnerable if conditions change or diseases strike."
        },
        {
            q: "How does a wild, unbred population typically compare to a selectively bred population when an unexpected environmental crisis occurs?",
            options: [
                "Wild populations crash immediately because they lack any specialized traits.",
                "Wild populations generally adapt better due to a higher diversity of hidden, variable traits.",
                "Selectively bred populations survive better because they are physically superior in every context.",
                "Both groups adapt at exactly the same rate because their base biology remains unchanged."
            ],
            correct: 1,
            explain: "High genetic variation acts as a biological safety net. Wild populations contain a diverse pool of alleles, meaning some individuals will likely carry traits that provide survival advantages during an unexpected shift."
        },
        {
            q: "What happens to unselected or hidden traits when breeders focus heavily on maximizing just one specific feature?",
            options: [
                "All other anatomical and physiological functions automatically improve to match the chosen feature.",
                "Unselected traits can inadvertently drop out of the population or link to harmful side effects.",
                "The unselected genes disappear safely and leave no impact on the future health of the bloodline.",
                "Unselected traits will naturally increase in expression speed to match the chosen feature."
            ],
            correct: 1,
            explain: "Focusing strictly on a single trait can cause genetic bottlenecking or linkage errors, accidentally locking in harmful recessive traits, physical weaknesses, or reduced lifespans."
        },
        {
            q: "Which statement best describes the fundamental process of selective breeding?",
            options: [
                "Splicing foreign DNA segments into plant and animal genomes inside a sterile molecular lab.",
                "Steering traditional reproduction over multiple generations by choosing which individuals are allowed to mate.",
                "Exposing populations to toxic chemicals to force immediate mutations.",
                "Allowing nature to freely dictate survival patterns without any human management."
            ],
            correct: 1,
            explain: "Selective breeding works completely within natural reproductive cycles. It changes the frequency of traits over generations simply by controlling which individuals successfully reproduce."
        }
    ];

    let itemIndex = 0;
    let pointsAccumulator = 0;
    let clickLockout = false;

    // DOM selectors
    const qText = document.getElementById('question-text');
    const optionsBox = document.getElementById('options-box');
    const badgeText = document.getElementById('badge-text');
    const barFill = document.getElementById('bar-fill');
    const quizPanel = document.getElementById('quiz-panel');
    const resultsPanel = document.getElementById('results-panel');
    const scoreLabel = document.getElementById('final-score');
    const feedbackMsg = document.getElementById('feedback-msg');
    const reviewList = document.getElementById('review-list');

    function paintUI() {
        if (itemIndex >= questionsDatabase.length) {
            evaluateEndGame();
            return;
        }

        clickLockout = false;
        const currentData = questionsDatabase[itemIndex];
        
        // Update Progress
        const calculatedProgress = (itemIndex / questionsDatabase.length) * 100;
        barFill.style.width = `${calculatedProgress}%`;
        badgeText.textContent = `Q. ${itemIndex + 1} / ${questionsDatabase.length}`;
        
        // Inject Context Strings
        qText.textContent = currentData.q;
        optionsBox.innerHTML = '';

        // Draw Interactive Selections
        currentData.options.forEach((txt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-button';
            btn.textContent = txt;
            btn.addEventListener('click', () => verifySelection(idx, btn));
            optionsBox.appendChild(btn);
        });
    }

    function verifySelection(userChoice, triggeredBtn) {
        if (clickLockout) return;
        clickLockout = true;

        const actualCorrectIndex = questionsDatabase[itemIndex].correct;
        const totalButtons = optionsBox.children;

        if (userChoice === actualCorrectIndex) {
            pointsAccumulator++;
            triggeredBtn.classList.add('correct');
        } else {
            triggeredBtn.classList.add('wrong');
            totalButtons[actualCorrectIndex].classList.add('correct');
        }

        // Delay step to allow visual review of validation states
        setTimeout(() => {
            itemIndex++;
            paintUI();
        }, 1250);
    }

    function evaluateEndGame() {
        quizPanel.style.display = 'none';
        resultsPanel.style.display = 'block';
        
        barFill.style.width = '100%';
        scoreLabel.textContent = pointsAccumulator;

        // Custom Evaluation Copy
        if (pointsAccumulator === 6) {
            feedbackMsg.textContent = "Flawless performance! You completely understand genetic selection dynamics.";
            feedbackMsg.style.color = "var(--accent-success)";
        } else if (pointsAccumulator >= 4) {
            feedbackMsg.textContent = "Great job! You have a solid grasp of fundamental biological selections.";
            feedbackMsg.style.color = "#a855f7";
        } else {
            feedbackMsg.textContent = "Good try! Take a look through the review concepts below to strengthen your understanding.";
        }

        // Render Review Lists
        reviewList.innerHTML = '';
        questionsDatabase.forEach((item, index) => {
            const wrap = document.createElement('div');
            wrap.className = 'review-card';
            wrap.innerHTML = `
                <h4><strong>Q${index + 1}:</strong> ${item.q}</h4>
                <p><strong>Core Concept:</strong> ${item.explain}</p>
            `;
            reviewList.appendChild(wrap);
        });
    }

    function resetQuiz() {
        itemIndex = 0;
        pointsAccumulator = 0;
        resultsPanel.style.display = 'none';
        quizPanel.style.display = 'block';
        paintUI();
    }

    // Launch Application
    window.addEventListener('DOMContentLoaded', paintUI);
</script>
</body>
</html>
